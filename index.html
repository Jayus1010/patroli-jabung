<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SiPatrol - Security</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <style>
    #loading { display: none; }
    .is-loading #loading { display: flex; }
  </style>
</head>
<body class="bg-gray-200 min-h-screen text-gray-800 font-sans">
    
    <div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-lg relative overflow-hidden">
        <div id="loading" class="absolute inset-0 bg-white/90 z-50 flex-col justify-center items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-blue-800 mb-4"></div>
            <p class="text-blue-800 font-bold animate-pulse" id="loading-text">Memproses...</p>
        </div>

        <header class="bg-slate-800 text-white p-5 text-center shadow-md">
            <h1 class="text-2xl font-bold tracking-wide">SiPatrol</h1>
            <p class="text-xs text-slate-300">Sistem Patroli Security</p>
        </header>

        <!-- HALAMAN LOGIN -->
        <div id="login-view" class="p-6 mt-4">
            <div class="space-y-5 bg-slate-50 p-6 rounded-xl border border-slate-100">
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">NIK / Username</label>
                    <input type="text" id="username" class="w-full border-2 border-slate-200 rounded-lg p-3 outline-none focus:border-blue-600 transition" placeholder="Masukkan NIK Anda">
                </div>
                <div>
                    <label class="block text-sm font-semibold mb-1 text-slate-700">PIN Keamanan</label>
                    <input type="password" id="pin" class="w-full border-2 border-slate-200 rounded-lg p-3 outline-none focus:border-blue-600 transition" placeholder="Masukkan PIN">
                </div>
                <button onclick="doLogin()" class="w-full bg-blue-700 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-800 transition shadow-md mt-2">
                    Masuk Bertugas
                </button>
            </div>
        </div>

        <!-- HALAMAN DASHBOARD / SCANNER -->
        <div id="dashboard-view" class="p-6 hidden flex-col h-full">
            <div class="bg-blue-50 border-l-4 border-blue-700 rounded-r-lg p-4 mb-6 shadow-sm">
                <p class="text-sm text-slate-600">Petugas Jaga:</p>
                <p class="text-xl font-extrabold text-slate-800" id="user-name-display">Nama Anggota</p>
            </div>

            <div id="gps-status" class="mb-5 p-3 rounded-lg text-sm text-center font-bold bg-yellow-100 text-yellow-700 border border-yellow-300">
                Mencari sinyal GPS (Lokasi)...
            </div>

            <!-- Tombol Live Camera Utama -->
            <button id="btn-scan" onclick="startScanner()" class="w-full bg-emerald-600 text-white font-bold py-4 px-4 rounded-xl shadow-lg hover:bg-emerald-700 transition flex items-center justify-center gap-2 mb-4 opacity-50 cursor-not-allowed" disabled>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm14 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" /></svg>
                Scan Live Barcode
            </button>

            <!-- Area Tampilan Kamera Scanner -->
            <div id="reader-container" class="mt-4 hidden relative bg-black rounded-xl overflow-hidden shadow-xl mb-4">
                <div id="reader" class="w-full"></div>
                <button onclick="stopScanner()" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-red-600 text-white font-bold py-2 px-6 rounded-full shadow-lg border-2 border-white z-10">
                    Batal
                </button>
            </div>

            <button onclick="doLogout()" class="w-full mt-auto bg-slate-200 text-slate-700 font-bold py-3 px-4 rounded-lg hover:bg-slate-300 transition">Selesai Bertugas (Logout)</button>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        // ==========================================
        // KONFIGURASI API BACKEND
        // ==========================================
        // URL WEB APP GOOGLE APPS SCRIPT SUDAH DIMASUKKAN
        const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbxNvOreC7Lpj9rg59gDpVfSR8Z2l9XNxlfPREr-FXLtI_F-NZdBphNrYkxg8BEEj7mu/exec'; 

        let currentUser = null;
        let currentLat = null;
        let currentLng = null;
        let html5QrcodeScanner = null;

        function showLoading(text) {
            document.getElementById('loading-text').innerText = text;
            document.getElementById('app').classList.add('is-loading');
        }

        function hideLoading() {
            document.getElementById('app').classList.remove('is-loading');
        }

        // Fungsi Helper untuk memanggil API GAS dengan metode Fetch
        async function fetchAPI(action, payloadData = {}) {
            try {
                const response = await fetch(GAS_API_URL, {
                    method: 'POST',
                    // Kita gunakan text/plain untuk membypass masalah CORS Preflight bawaan browser ke GAS
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: action, ...payloadData })
                });
                return await response.json();
            } catch (error) {
                console.error("Fetch Error:", error);
                return { success: false, message: 'Gagal terhubung ke server. Periksa koneksi internet.' };
            }
        }

        // --- 1. FITUR LOGIN ---
        async function doLogin() {
            const user = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;

            if(!user || !pin) return alert('Silakan isi NIK dan PIN terlebih dahulu.');

            if(GAS_API_URL === 'ISI_DENGAN_URL_WEB_APP_GAS_KAMU') {
                return alert('Developer Error: URL GAS_API_URL belum diisi di kode HTML!');
            }

            showLoading('Memverifikasi Identitas...');
            
            // Panggil API Backend
            const result = await fetchAPI('login', { username: user, pin: pin });
            
            hideLoading();

            if (result.success) {
                currentUser = { username: user, nama: result.nama };
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                document.getElementById('user-name-display').innerText = result.nama;
                initGPS();
            } else {
                alert('❌ GAGAL: ' + result.message);
            }
        }

        function doLogout() {
            if(html5QrcodeScanner) stopScanner();
            currentUser = null;
            document.getElementById('username').value = '';
            document.getElementById('pin').value = '';
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
        }

        // --- 2. FITUR KUNCI LOKASI (GEOLOCATION API) ---
        function initGPS() {
            const gpsStatus = document.getElementById('gps-status');
            const btnScan = document.getElementById('btn-scan');

            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        currentLat = position.coords.latitude;
                        currentLng = position.coords.longitude;
                        
                        gpsStatus.innerText = `📍 GPS Aktif (Akurasi: ${Math.round(position.coords.accuracy)}m)`;
                        gpsStatus.className = 'mb-5 p-3 rounded-lg text-sm text-center font-bold bg-green-100 text-green-800 border border-green-300';
                        
                        btnScan.disabled = false;
                        btnScan.classList.remove('opacity-50', 'cursor-not-allowed');
                    },
                    (error) => {
                        gpsStatus.innerText = '❌ GPS Ditolak! Anda harus izinkan akses lokasi (GPS) di browser untuk patroli.';
                        gpsStatus.className = 'mb-5 p-3 rounded-lg text-sm text-center font-bold bg-red-100 text-red-800 border border-red-300';
                        
                        btnScan.disabled = true;
                        btnScan.classList.add('opacity-50', 'cursor-not-allowed');
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                );
            } else {
                gpsStatus.innerText = 'Browser/HP Anda tidak mendukung pelacakan GPS.';
            }
        }

        // --- 3. FITUR LIVE SCANNER ---
        function startScanner() {
            if(!currentLat || !currentLng) return alert('Lokasi (GPS) belum terkunci!');

            document.getElementById('reader-container').classList.remove('hidden');
            document.getElementById('btn-scan').classList.add('hidden');

            html5QrcodeScanner = new Html5Qrcode("reader");
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                onScanSuccess,
                (errorMessage) => { /* abaikan error fokus */ }
            ).catch(err => {
                alert("Gagal membuka kamera. Pastikan browser memberikan izin kamera.");
                stopScanner();
            });
        }

        function stopScanner() {
            if(html5QrcodeScanner) {
                html5QrcodeScanner.stop().then(() => {
                    document.getElementById('reader-container').classList.add('hidden');
                    document.getElementById('btn-scan').classList.remove('hidden');
                }).catch(err => console.error("Stop scanner error", err));
            } else {
                document.getElementById('reader-container').classList.add('hidden');
                document.getElementById('btn-scan').classList.remove('hidden');
            }
        }

        // --- 4. KIRIM DATA KE SERVER ---
        async function onScanSuccess(decodedText, decodedResult) {
            stopScanner();
            showLoading('Mencatat Data Patroli...');

            // Rangkai nilai koordinat menjadi format link Google Maps
            const urlGoogleMaps = `https://www.google.com/maps?q=${currentLat},${currentLng}`;

            const payload = {
                data: {
                    username: currentUser.username,
                    nama: currentUser.nama,
                    qrCode: decodedText, 
                    lat: currentLat,    
                    lng: currentLng,
                    mapsUrl: urlGoogleMaps // Masukkan link ke dalam payload
                }
            };

            const result = await fetchAPI('submitPatrol', payload);
            
            hideLoading();
            if (result.success) {
                alert('✅ ' + result.message);
            } else {
                alert('❌ GAGAL: ' + result.message);
            }
        }
    </script>
</body>
</html>
